    {
      "@type": "Question",
      "name": "Le Diagnostic de Performance Énergétique (DPE) est-il obligatoire pour obtenir MaPrimeRénov' ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, le DPE est indispensable pour bénéficier des aides MaPrimeRénov' et des autres subventions. Sans un DPE valide, il est impossible de constituer un dossier d'aides."

    {
      "@type": "Question",
      "name": "Quel est le coût moyen d'un audit énergétique complet avec DPE ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Le coût d’un audit énergétique complet avec DPE, réalisé par un Accompagnateur Rénov’ agréé, se situe généralement entre 1500 € et 2500 €, en fonction de votre bien."
      }
    },
    {
      "@type": "Question",
      "name": "Quels travaux peuvent améliorer le score DPE de mon logement ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Les travaux les plus efficaces pour améliorer un DPE incluent l'isolation thermique (combles, murs, planchers), le remplacement des menuiseries, la modernisation du système de chauffage, et l'amélioration de la ventilation."
      }
    },
    {
      "@type": "Question",
      "name": "Le DPE permet-il de valoriser mon bien immobilier ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, un meilleur score DPE valorise fortement votre bien sur le marché immobilier. Un logement économe en énergie est plus attractif à la vente ou à la location."
      }
    },
    {
      "@type": "Question",
      "name": "Combien de temps est valable un Diagnostic de Performance Énergétique (DPE) ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Le DPE est valable 10 ans, sauf si vous réalisez des travaux importants de rénovation énergétique entre-temps."
      }
    },
    {
      "@type": "Question",
      "name": "Quelles aides financières sont conditionnées par le DPE ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Le DPE conditionne l'obtention de MaPrimeRénov', des Certificats d'Économie d'Énergie (CEE), de l'Éco-PTZ, et parfois d'aides locales ou régionales."
      }
    },
    {
      "@type": "Question",
      "name": "Qui peut réaliser un DPE conforme et valable ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Le DPE doit être réalisé par un professionnel certifié, tel qu’un Accompagnateur Rénov’ agréé. RenoHab vous met en relation avec ces experts."
      }
    },
    {
      "@type": "Question",
      "name": "Puis-je obtenir des aides si mon logement a une étiquette DPE F ou G ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, au contraire : les logements très énergivores (F ou G) peuvent bénéficier d'aides renforcées, à condition de s'engager dans un parcours de rénovation globale."
      }
